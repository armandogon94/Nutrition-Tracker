services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-fit_db}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8030}:8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-fit_db}
      ENVIRONMENT: development
      OFF_BASE_URL: ${OFF_BASE_URL:-https://world.openfoodfacts.org}
      OFF_USER_AGENT: ${OFF_USER_AGENT:-FitTracker/2.0}
      USDA_FDC_KEY: ${USDA_FDC_KEY:-}
      FATSECRET_CONSUMER_KEY: ${FATSECRET_CONSUMER_KEY:-}
      FATSECRET_CONSUMER_SECRET: ${FATSECRET_CONSUMER_SECRET:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      FRONTEND_URL: http://localhost:${FRONTEND_PORT:-3030}
    restart: unless-stopped

  web:
    build: ./frontend
    depends_on:
      - api
    ports:
      - "${FRONTEND_PORT:-3030}:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_PORT:-8030}
    restart: unless-stopped

volumes:
  postgres_data:

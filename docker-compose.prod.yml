services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-nutrition_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  api:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-nutrition_db}
      ENVIRONMENT: production
      SECRET_KEY: ${SECRET_KEY}
      OFF_BASE_URL: https://world.openfoodfacts.org
      OFF_USER_AGENT: ${OFF_USER_AGENT:-NutritionTracker/1.0 (nutrition.armandointeligencia.com)}
      USDA_FDC_KEY: ${USDA_FDC_KEY:-}
      FATSECRET_CONSUMER_KEY: ${FATSECRET_CONSUMER_KEY:-}
      FATSECRET_CONSUMER_SECRET: ${FATSECRET_CONSUMER_SECRET:-}
      FRONTEND_URL: https://nutrition.armandointeligencia.com
    networks:
      - backend
      - frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nutrition-api.rule=Host(`api.nutrition.armandointeligencia.com`)"
      - "traefik.http.routers.nutrition-api.entrypoints=websecure"
      - "traefik.http.routers.nutrition-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.nutrition-api.loadbalancer.server.port=8001"

  web:
    build: ./frontend
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: https://api.nutrition.armandointeligencia.com
    networks:
      - frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nutrition.rule=Host(`nutrition.armandointeligencia.com`)"
      - "traefik.http.routers.nutrition.entrypoints=websecure"
      - "traefik.http.routers.nutrition.tls.certresolver=letsencrypt"
      - "traefik.http.services.nutrition.loadbalancer.server.port=3000"

volumes:
  postgres_data:

networks:
  backend:
  frontend:
